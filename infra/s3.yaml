AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Customer Data Deduplication - S3 Buckets
  BatchInputBucket for batch CSV/JSON uploads.
  AuditLogsBucket for audit trail JSON files.
  BatchReportsBucket for batch summary report JSON files.

Resources:
  BatchInputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-dedup-batch-input'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AuditLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-dedup-audit-logs'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: AuditLogsRetention
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 90
            ExpirationInDays: 365

  BatchReportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-dedup-batch-reports'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  BatchInputBucketName:
    Description: Name of the batch input S3 bucket
    Value: !Ref BatchInputBucket
    Export:
      Name: !Sub '${AWS::StackName}-BatchInputBucketName'

  BatchInputBucketArn:
    Description: ARN of the batch input S3 bucket
    Value: !GetAtt BatchInputBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BatchInputBucketArn'

  AuditLogsBucketName:
    Description: Name of the audit logs S3 bucket
    Value: !Ref AuditLogsBucket
    Export:
      Name: !Sub '${AWS::StackName}-AuditLogsBucketName'

  AuditLogsBucketArn:
    Description: ARN of the audit logs S3 bucket
    Value: !GetAtt AuditLogsBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AuditLogsBucketArn'

  BatchReportsBucketName:
    Description: Name of the batch reports S3 bucket
    Value: !Ref BatchReportsBucket
    Export:
      Name: !Sub '${AWS::StackName}-BatchReportsBucketName'

  BatchReportsBucketArn:
    Description: ARN of the batch reports S3 bucket
    Value: !GetAtt BatchReportsBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BatchReportsBucketArn'
